<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Usuarios</title>

  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet"
  href="styles/styles.css">

</head>
<body>

<div class="container">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div>

      <h2 class="logo">
        ADISAN
      </h2>

      <ul>

        <li onclick="ir('dashboard.html')">

          <i class="fa-solid fa-chart-line"></i>

          Dashboard

        </li>

        <li onclick="ir('productos.html')">

          <i class="fa-solid fa-box"></i>

          Añadir Productos

        </li>

        <li class="active">

          <i class="fa-solid fa-users"></i>

          Usuarios

        </li>

        <li onclick="ir('proveedores.html')">

          <i class="fa-solid fa-truck"></i>

          Proveedores

        </li>

        <li id="menuOfertas" onclick="ir('ofertas.html')">

          <i class="fa-solid fa-tag"></i>

          Ofertas

        </li>

        <li onclick="ir('pedidos.html')">

          <i class="fa-solid fa-bag-shopping"></i>

          Pedidos

        </li>
<li onclick="ir('catalogo.html')">

  <i class="fa-solid fa-store"></i>

  Comprar productos

</li>
        <li onclick="ir('carrito.html')">

          <i class="fa-solid fa-cart-shopping"></i>

          Carrito
          <span
          id="contadorCarrito"
          class="cart-badge">

          0

          </span>
        </li>

      </ul>

    </div>

    <button
      onclick="logout()"
      class="logout-sidebar"
    >

      <i class="fa-solid fa-right-from-bracket"></i>

      Cerrar Sesión

    </button>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <!-- TOPBAR -->

    <div class="topbar">

      <div>

        <h1>
          USUARIOS
        </h1>

        <p class="subtitle">
          Gestión de usuarios del sistema
        </p>

      </div>

      <div class="usuario-box">

        <i class="fa-solid fa-user"></i>

        <span id="usuario"></span>

        -

        <span id="rol"></span>

      </div>

    </div>

    <!-- PANEL -->

    <div class="panel">

      <div class="panel-header">

        <h2>

          <i class="fa-solid fa-users"></i>

          Lista de Usuarios

        </h2>

      </div>

      <div class="table-container">

        <table>

          <thead>

            <tr>

              <th>

                <i class="fa-solid fa-user"></i>

                Nombre

              </th>

              <th>

                <i class="fa-solid fa-at"></i>

                Usuario

              </th>

              <th>

                <i class="fa-solid fa-shield"></i>

                Rol

              </th>

              <th>

                <i class="fa-solid fa-id-card"></i>

                RUC

              </th>

              <th>

                <i class="fa-solid fa-envelope"></i>

                Correo

              </th>

              <th>

                <i class="fa-solid fa-phone"></i>

                Teléfono

              </th>

              <th>

                <i class="fa-solid fa-location-dot"></i>

                Dirección

              </th>

            </tr>

          </thead>

          <tbody id="tablaUsuarios">

          </tbody>

        </table>
<div
id="paginationUsuarios"
class="pagination">

</div>
      </div>

    </div>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
