<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofertas - ADISAN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <div>
      <h2 class="logo">ADISAN</h2>
      <ul>
        <li id="menuDashboard" onclick="ir('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
        <li id="menuProductos" onclick="ir('productos.html')"><i class="fa-solid fa-box"></i> Añadir Productos</li>
        <li id="menuUsuarios" onclick="ir('usuarios.html')"><i class="fa-solid fa-users"></i> Usuarios</li>
        <li id="menuProveedores" onclick="ir('proveedores.html')"><i class="fa-solid fa-truck"></i> Proveedores</li>
        <li class="active" id="menuOfertas"><i class="fa-solid fa-tag"></i> Ofertas</li>
        <li onclick="ir('pedidos.html')"><i class="fa-solid fa-bag-shopping"></i> Pedidos</li>
        <li onclick="ir('catalogo.html')"><i class="fa-solid fa-store"></i> Comprar productos</li>
        <li onclick="ir('carrito.html')"><i class="fa-solid fa-cart-shopping"></i> Carrito <span id="contadorCarrito" class="cart-badge">0</span></li>
      </ul>
    </div>
    <button onclick="logout()" class="logout-sidebar"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</button>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>OFERTAS</h1>
        <p class="subtitle">Crea paquetes promocionales de productos</p>
      </div>
      <div class="usuario-box"><i class="fa-solid fa-user"></i> <span id="usuario"></span> - <span id="rol"></span></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2><i class="fa-solid fa-pen-to-square"></i> Nueva Oferta</h2>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-weight:600;font-size:14px;display:block;margin-bottom:6px">Nombre de la oferta</label>
        <input type="text" id="ofertaNombre" placeholder="Ej: Súper Oferta Black Friday" style="width:100%;height:48px;border-radius:var(--radius-md);border:1.5px solid var(--border);padding:0 16px;font-size:15px;box-sizing:border-box">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-weight:600;font-size:14px;display:block;margin-bottom:6px">Precio de oferta (S/)</label>
        <input type="number" id="ofertaPrecio" step="0.01" min="0" placeholder="0.00" style="width:200px;height:48px;border-radius:var(--radius-md);border:1.5px solid var(--border);padding:0 16px;font-size:15px">
      </div>
      <div style="margin-bottom:12px">
        <label style="font-weight:600;font-size:14px;display:block;margin-bottom:6px">Productos incluidos</label>
        <div id="ofertasItemsContainer"></div>
        <button onclick="agregarItemOferta()" class="btn-secondary" style="margin-top:4px"><i class="fa-solid fa-plus"></i> Agregar producto</button>
      </div>
      <br>
      <button onclick="guardarOferta()"><i class="fa-solid fa-floppy-disk"></i> Guardar Oferta</button>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2><i class="fa-solid fa-list"></i> Ofertas Vigentes</h2>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Productos</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaOfertas"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
